<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <title>Capital Plus - Gestión de Cobros</title>
    <style>
        /* Paleta Capital Plus */
        :root {
            --oro: #c5a043;
            --oro-hover: #b48f32;
            --fondo-logo: #f7f7f7; 
        }
        .bg-oro { background-color: var(--oro); }
        .text-oro { color: var(--oro); }
        .focus-ring-oro:focus { border-color: var(--oro); --tw-ring-color: var(--oro); }
        
        body { background-color: var(--fondo-logo) !important; }
    </style>
</head>

<body class="text-slate-900 p-4 md:p-10">

    <div class="max-w-6xl mx-auto">

        <header class="mb-10 mt-0 md:mt-2 flex flex-col items-center gap-6">
            <div class="flex items-center gap-4 mt-2 md:mt-0">
                <div class="w-28 md:w-40 flex-shrink-0 flex items-center min-[389px]:mt-4">
                    <img src="./img/WhatsApp_Image_2026-04-10_at_18.36.55-removebg-preview.png" alt="Capital Plus Logo" class="w-full object-contain">
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Capital <span class="text-oro">Plus</span></h1>
                    <p class="text-slate-500 italic font-medium">Control de Cobranzas y Clientes</p>
                </div>
            </div>
            <div class="w-full flex flex-col items-center gap-2">
                <div id="usuario-actual" class="hidden bg-sky-100 px-2.5 py-1.5 rounded-xl border border-sky-200 text-sky-800 font-bold text-xs w-fit max-w-full">
                    <span class="inline-flex items-center gap-1.5">
                        <i data-lucide="user-round" class="w-3.5 h-3.5"></i>
                        <span id="usuario-actual-texto">Usuario</span>
                    </span>
                </div>
                <div id="fecha-actual" class="bg-slate-700 px-3 py-1.5 rounded-xl border border-slate-500 text-white font-bold text-xs w-fit max-w-full"></div>
                <button id="btn-logout" type="button" class="px-4 py-2 rounded-xl bg-rose-200 text-rose-800 text-xs font-bold border border-rose-300 hover:bg-rose-300 transition-all w-fit">Salir</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-12">

            <section class="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6 text-oro">
                    <i data-lucide="user-plus"></i>
                    <h2 class="text-lg font-bold text-slate-800">Cargar Usuario</h2>
                </div>
                <form id="form-cliente" class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="nombre" placeholder="Nombre" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro" required>
                        <input type="text" id="apellido" placeholder="Apellido" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro" required>
                    </div>
                    <input type="number" id="dni" placeholder="DNI" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro" required>
                    <input type="number" id="telefono" placeholder="Número de Teléfono" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro" required>
                    <input type="text" id="direccion-real" placeholder="Dirección Real" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro" required>
                    <input type="text" id="direccion-comercio" placeholder="Dirección Comercio (Opcional)" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro">
                    <input type="text" id="rubro" placeholder="Rubro (Opcional)" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus-ring-oro">
                    
                    <button type="submit" class="w-full bg-oro text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all shadow-md active:scale-95 mt-2">Guardar Cliente</button>
                </form>
            </section>

            <section class="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6 text-emerald-600">
                    <i data-lucide="badge-dollar-sign"></i>
                    <h2 class="text-lg font-bold text-slate-800">Nuevo Crédito</h2>
                </div>
                <form id="form-credito" class="space-y-3">
                    <input type="number" id="dni-credito" placeholder="DNI del Cliente" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                    
                    <input type="text" id="nombre-credito" placeholder="Nombre del Crédito (Ej: Prestamo 1)" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>

                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 mb-1">Tipo de Plan</label>
                        <select id="plan-cuotas" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 text-slate-600">
                            <option value="12">12 Días (20% Int)</option>
                            <option value="17">17 Días (25.8% Int)</option>
                            <option value="24">24 Días (40.8% Int)</option>
                            <option value="36">36 Días (60% Int)</option>
                        </select>
                    </div>

                    <input type="number" id="monto-pedido" placeholder="Monto que pidió ($)" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                    
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 mb-1">Fecha de carga (1ra cuota al día siguiente)</label>
                        <input type="date" id="fecha-inicio-credito" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" required>
                    </div>

                    <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 transition-all shadow-md active:scale-95 mt-2">Cargar Crédito</button>
                </form>
            </section>

            <section class="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6 text-slate-400">
                    <i data-lucide="hand-coins"></i>
                    <h2 class="text-lg font-bold text-slate-800">Registrar Pago</h2>
                </div>
                <form id="form-pago" class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="nombre-pago" placeholder="Nombre del Cliente" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400" required>
                        <input type="text" id="apellido-pago" placeholder="Apellido del Cliente" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400" required>
                    </div>

                    <div id="bloque-cliente-homonimo" class="hidden">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 mb-1">Seleccionar Cliente (Homónimos)</label>
                        <select id="select-cliente-pago" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400 text-slate-600 disabled:opacity-50" disabled>
                            <option value="">Selecciona cliente por DNI/teléfono...</option>
                        </select>
                    </div>
                    
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 mb-1">Seleccionar Crédito</label>
                        <select id="select-credito-pago" class="w-full p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400 text-slate-600 disabled:opacity-50" disabled required>
                            <option value="">Ingrese nombre y apellido primero...</option>
                        </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="nro-cuota" placeholder="N° Cuota (Auto sugerida)" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400" required>
                        <input type="number" id="monto-pagado" step="0.01" min="0.01" placeholder="Monto ($)" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400" required>
                    </div>

                    <p id="info-cuota-pendiente" class="text-xs font-semibold text-slate-500 ml-1">
                        Selecciona un crédito para ver el saldo pendiente de la cuota.
                    </p>
                    
                    <div class="flex flex-col">
                        <label class="text-[10px] uppercase font-bold text-slate-400 ml-2 mb-1">Fecha del Pago</label>
                        <input type="date" id="fecha-pago" class="p-3 text-sm bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-slate-400" required>
                    </div>

                    <button type="submit" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-900 transition-all shadow-md active:scale-95 mt-2">Confirmar Pago</button>
                </form>
            </section>
        </div>

        <!-- LISTADO DE CLIENTES -->
        <div class="mb-12">

            <div class="text-center mb-8">
                <h2 class="text-3xl font-black text-slate-800 mb-4">Listado de Clientes</h2>
                <div class="flex flex-wrap justify-center gap-2">
                    <button data-filtro="todos" class="js-filtro-btn px-5 py-2 rounded-xl bg-oro text-white shadow-md font-bold text-xs transition-all active:scale-95">Todos</button>
                    <button data-filtro="activos" class="js-filtro-btn px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-500 font-bold text-xs hover:bg-slate-50 transition-all">Activos</button>
                    <button data-filtro="urgentes" class="js-filtro-btn px-5 py-2 rounded-xl bg-white border border-slate-200 text-rose-500 font-bold text-xs hover:bg-rose-50 transition-all">⚠️ Urgentes</button>
                    <button data-filtro="finalizados" class="js-filtro-btn px-5 py-2 rounded-xl bg-white border border-slate-200 text-slate-500 font-bold text-xs hover:bg-slate-50 transition-all">Finalizados</button>
                </div>
                <div class="relative max-w-xs md:max-w-md mx-auto mt-4">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    <input 
                        type="text" 
                        id="buscador-clientes"
                        placeholder="Buscar cliente por nombre..."
                        class="w-full pl-10 pr-4 py-3 text-sm bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-[#c5a043] focus:border-[#c5a043] shadow-sm transition-all"
                    >
                </div>
            </div>

            <!-- CONTENEDOR DE CLIENTES -->
            <div id="contenedor-clientes" class="grid grid-cols-1 gap-6">
            </div>
        </div>

    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/Datos.js"></script>
    <script src="./js/Logic.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/ui/renderClientes.js"></script>
    <script src="./js/ui/pagosForm.js"></script>
    <script src="./js/main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        document.getElementById('fecha-actual').innerText = new Date().toLocaleDateString('es-AR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    </script>
</body>
</html>
